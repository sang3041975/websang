<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSweb</title>
    <script type="module">
        // Bên trong thẻ <script type="module">
        window.triggerUpload = triggerUpload;
        window.deleteItem = deleteItem;
        window.filterCategory = filterCategory;
        window.handleSearch = handleSearch;
        window.closeLightbox = closeLightbox;
        window.openLightbox = openLightbox;
        window.changeImage = changeImage;
        // Thêm vào trong thẻ <script type="module">
        window.galleryImages = [];
        window.currentCategory = localStorage.getItem('lastCategory') || 'Clannad';
        window.searchQuery = '';
        window.IMAGES_PER_PAGE = 32;
        window.currentPage = 1;

        // Thêm sự kiện để tự động chọn đúng Tab khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            // Tìm tab nào có tên trùng với category hiện tại
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => {
                // Kiểm tra nếu nội dung của tab khớp với category đã lưu
                if (tab.innerText.trim() === window.currentCategory) {
                    tabs.forEach(t => t.classList.remove('active')); // Bỏ active cũ
                    tab.classList.add('active'); // Thêm active vào tab đúng
                }
            });
        });
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình của bạn (Thay thế các thông tin bên dưới thông qua firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyDqjjFGMhVq8wF0_Tv3z7CCupB1Z2wKuPc",
            authDomain: "anemoi-4e558.firebaseapp.com",
            projectId: "anemoi-4e558",
            storageBucket: "anemoi-4e558.firebasestorage.app",
            messagingSenderId: "252203668975",
            appId: "1:252203668975:web:071bcf1b5a31fd229c121a",
            measurementId: "G-PPXQ3PHP4R"
        };

        // Khởi tạo
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
        window.doc = doc;

        onSnapshot(collection(window.db, "images"), (snapshot) => {
            galleryImages = [];
            snapshot.forEach((doc) => {
                // Lưu ID của tài liệu để sau này còn xóa ảnh
                galleryImages.push({ id: doc.id, ...doc.data() });
            });
            renderGallery();
        });
        const cloudName = "dhhzaymet"; 
        const uploadPreset = "jh3cmolr";
        function triggerUpload() {
            const myWidget = cloudinary.createUploadWidget({
                cloudName: "dhhzaymet",
                uploadPreset: "jh3cmolr",
                multiple: true,
                sources: ['local', 'url']
            }, async (error, result) => {
                if (!error && result && result.event === "success") {
                    const newItem = {
                        title: result.info.original_filename,
                        data: result.info.secure_url,
                        category: currentCategory
                    };
                    // Lưu vào Firebase Firestore
                    await addDoc(collection(window.db, "images"), newItem);
                    // Không cần renderGallery() ở đây vì onSnapshot sẽ tự động làm việc đó
                }
            });
            myWidget.open();
        }
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            currentPage = 1;
            renderGallery();
        }
        function filterCategory(cat, el) {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentCategory = cat;
            currentPage = 1;
            localStorage.setItem('lastCategory',cat);
            renderGallery();
            updateBackground(cat);
            
            const bgLayer = document.getElementById('bg-layer');
            const backgrounds = {
                'Clannad': 'url(clannad.jpg)',
                'Air': 'url(air.jpg)',
                'Angel Beats':'url(tenshi.jpg)',
                'Kanon':'url(kanon.png)',
                'Anemoi':'url(anemoi.png)',
                'Khác':'url(nentrang.jpg)',
                'Rewrite':'url(kagari.png)',
                'Little Busters':'url(friend.jpg)',
                'Summer Pockets':'url(Shiroha.jpg)'

            
            };
            

            bgLayer.style.backgroundImage = backgrounds[cat] || 'url("clannad.jpg")';

            localStorage.setItem('lastCategory', cat);
            renderGallery();           
        }
        let activeLayer = 1;

        // Mảng chứa các link ảnh nền của bạn
        const bgSources = {
            'Clannad': 'clannad.jpg',
            'Air': 'air.jpg',
            'Angel Beats':'tenshi.jpg',
            'Kanon':'kanon.png',
            'Anemoi':'anemoi.png',
            'Khác':'nentrang.jpg',
            'Rewrite':'kagari.png',
            'Little Busters':'friend.jpg',
            'Summer Pockets':'Shiroha.jpg'
        };
        
        // Bước 1: Preload toàn bộ ảnh nền khi trang vừa tải xong
        Object.values(bgSources).forEach(src => {
            const img = new Image();
            img.src = src;
        });
        
        function updateBackground(cat) {
            // Đảm bảo biến nextBg được tạo ngay tại đây
            const nextBg = bgSources[cat] || bgSources['Clannad'];
            
            // Logic 2 lớp
            const nextLayer = activeLayer === 1 ? document.getElementById('bg-layer-2') : document.getElementById('bg-layer-1');
            const currentLayer = activeLayer === 1 ? document.getElementById('bg-layer-1') : document.getElementById('bg-layer-2');
            
            if (nextLayer && currentLayer) {
                nextLayer.style.backgroundImage = `url('${nextBg}')`;
                nextLayer.style.opacity = 1;
                currentLayer.style.opacity = 0;
                activeLayer = activeLayer === 1 ? 2 : 1;
            }
        }
        // Lấy category cuối đã xem (nếu có)
        const savedCat = localStorage.getItem('lastCategory') || 'Clannad';
        window.currentCategory = savedCat;
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const pagination = document.getElementById('pagination');
            grid.innerHTML = ''; pagination.innerHTML = '';
            let filtered = galleryImages; // Bước 1: Mặc định lấy tất cả ảnh

            if (currentCategory !== 'All') { // Bước 2: Chỉ lọc nếu category khác 'All'
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }
            if (searchQuery) filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            if (!filtered.length) {
                grid.innerHTML = `<div class="no-results">Thư mục [${currentCategory}] trống.</div>`;
                return;
            }
            const totalPages = Math.ceil(filtered.length / IMAGES_PER_PAGE);
            const pageImages = filtered.slice((currentPage - 1) * IMAGES_PER_PAGE, currentPage * IMAGES_PER_PAGE);
            pageImages.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <button class="btn-delete-item" onclick="deleteItem(event, '${item.id}')">✕</button>
                    <div class="item-title">[ ${item.title} ]</div>
                    <div class="image-box" onclick="openLightbox('${item.data}')">
                        <img src="${item.data}" loading="lazy" alt="${item.tittle}">
                    </div>
                    <button class="btn-action" onclick="openLightbox('${item.data}')">拡大表示</button>
                `;
                grid.appendChild(div);
            });
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('span');
                    btn.className = `page-link ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => { currentPage = i; renderGallery(); };
                    pagination.appendChild(btn);
                }
            }
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        async function deleteItem(e, id) {
            e.stopPropagation();

                const isConfirmed = confirm("Bạn có muốn xoá không?");
                if (isConfirmed) {
                    await deleteDoc(doc(window.db, "images", id)); 
                }   
        }
        function openLightbox(src) {
            // 1. Tạo lại mảng filtered giống hệt logic trong renderGallery/changeImage
            let filtered = galleryImages;
            if (currentCategory !== 'All') {
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }
            if (searchQuery) {
                filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            }

            // 2. Tìm index của ảnh trong mảng ĐÃ LỌC
            currentIndex = filtered.findIndex(img => img.data === src);
    
            // 3. Hiển thị
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        // Dùng đoạn code này thay thế cho hàm changeImage hiện tại của bạn
        function changeImage(step) {
            // BƯỚC 1: LẤY DANH SÁCH ẢNH ĐANG ĐƯỢC LỌC (GIỐNG HỆT TRONG RENDERGALLERY)
            let filtered = galleryImages; // Bắt đầu với tất cả ảnh

            // a. Áp dụng bộ lọc danh mục
            if (currentCategory !== 'All') {
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }

            // b. Áp dụng bộ lọc tìm kiếm
            if (searchQuery) {
                filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            }

            // Nếu không có ảnh nào, thoát luôn
            if (filtered.length === 0) return;

            // BƯỚC 2: TÍNH TOÁN INDEX MỚI DỰA TRÊN DANH SÁCH ĐÃ LỌC
            // (Dùng phép toán chia lấy dư % để đảm bảo nó quay vòng)
            currentIndex = (currentIndex + step + filtered.length) % filtered.length;

            // BƯỚC 3: CẬP NHẬT ẢNH TRÊN LIGHTBOX
            document.getElementById('lightbox-img').src = filtered[currentIndex].data;
    
            // Tùy chọn: Cập nhật thêm tiêu đề nếu muốn
            // document.getElementById('lightbox-title').innerText = filtered[currentIndex].title;
        }
        let currentIndex = 0; // Biến lưu chỉ số ảnh đang xem
        document.addEventListener('keydown', function(e) {
            // Chỉ chạy nếu Lightbox đang mở
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    changeImage(-1); // Lùi ảnh
                } else if (e.key === 'ArrowRight') {
                    changeImage(1);  // Tới ảnh
                } else if (e.key === 'Escape') {
                    closeLightbox(); // Nhấn Esc để thoát
                }
            }
        });

        const btnTop = document.getElementById("backToTop");
        window.onscroll = () => {
            btnTop.style.display = (document.documentElement.scrollTop > 300) ? "block" : "none";
        };
        btnTop.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        
       

        
        </script>

        <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        /* --- 1. THIẾT LẬP CƠ BẢN & NỀN TRỜI --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-image: url('clannad.jpg'); 
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            display: flex;
            flex-direction: column; 
            align-items: center;
        }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px; /* Mở rộng chiều rộng tổng thể */
            padding: 25px 50px 10px 50px; 
            margin: 0 auto;
        }
        .logo {
            font-weight: bold;
            font-size: 22px;
            color: #0284c7;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .nav-links a {
            text-decoration: none;
            color: #0284c7;
            padding: 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .nav-links a.active, .nav-links a:hover {
            font-weight: bold;
            text-decoration: underline;
        }
        .dashboard-wrapper {
            width: 90%;
            max-width: 1200px; /* Cùng chiều rộng với khung ảnh */
            padding: 10px 0px 20px 0px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-title {
            font-size: 32px;
            font-weight: bold;
            color: #0284c7;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
            font-family: 'Georgia', serif;
        }
        .category-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 6px 16px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid #cbd5e1;
            color: #475569;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .category-tab.active {
            background-color: #0284c7;
            color: white;
            border-color: #0284c7;
        }
        .search-upload-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .search-box-wrapper {
            flex: 1;
            max-width: 600px; /* Tăng độ dài thanh tìm kiếm cho cân xứng */
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .btn-upload {
            padding: 10px 24px;
            border: 1px solid #0284c7;
            background-color: rgba(255, 255, 255, 0.8); 
            color: #0284c7;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-upload:hover {
            background-color: #0284c7;
            color: white;
        }
        #file-input {
            display: none;
        }
        .gallery-container {
            background-color: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rba(255, 255, 255, 0.3);
            border-radius: 20px;
            width: 90%;
            max-width: 1200px; 
            min-height: 580px; 
            padding: 20px 40px; /* Giảm nhẹ padding bên trong để ảnh to hơn */
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin: 20px auto;
        }
        /* Thiết lập cho màn hình nhỏ (Điện thoại) */
        @media (max-width: 600px) {
            #gallery-grid {
                /* Chuyển từ 4 cột sang 1 cột duy nhất trên điện thoại */
                grid-template-columns: 1fr !important; 
            }
            .gallery-item {
                /* Đảm bảo mỗi mục chiếm hết chiều ngang */
                width: 100%;
            }
        }

        /* Thiết lập cho màn hình máy tính bảng */
        @media (min-width: 601px) and (max-width: 1024px) {
            #gallery-grid {
                /* Chia thành 2 cột cho máy tính bảng */
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }
        .gallery-grid {
            display: grid;
            gap: 30px 15px; /* Giảm gap để vừa vặn 4 cột */
            padding: 40px 0 20px 0;
            width: 100%;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            
            
        }
        .gallery-item {
            position: relative; 
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            padding: 15px;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.8s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transfrom: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-delete-item {
            position: absolute;
            top: 30px; 
            right: 5px;
            width: 24px;
            height: 24px;
            background-color: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            opacity: 0; 
            transition: all 0.2s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
        }
        .gallery-item:hover .btn-delete-item {
            opacity: 1;
        }
        .item-title {
            color: #0284c7;
            font-size: 13px; /* Thu nhỏ chữ tiêu đề một chút */
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-box {
            width: 100%;
            height: 270px; /* GIẢM ĐỘ CAO: Từ 400px xuống 320px để cân đối 4 cột */
            border: 1px solid #cbd5e1;
            padding: 4px; 
            background-color: #e2e8f0; 
            animation: pulse 1.5s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: zoom-in; 
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            transition: transform 0.3s;
        }
        .image-box:hover img {
            transform: scale(1.05);
        }
        .btn-action {
            margin-top: 12px;
            width: 100%;
            padding: 6px 0;
            border: 1px solid #334155;
            background-color: white;
            border-radius: 20px; 
            font-size: 12px;
            cursor: pointer;
        }
        .no-results {
            grid-column: span 4; /* SPAN 4: Để tin nhắn báo trống nằm giữa 4 cột */
            text-align: center;
            padding: 60px 0;
            color: #64748b;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            gap: 8px;
        }
        .page-link {
            padding: 5px 10px;
            border: 1px solid #cbd5e1;
            background-color: white;
            color: #0284c7;
            border-radius: 4px;
            cursor: pointer;
        }
        .page-link.active {
            background-color: #0284c7;
            color: white;
        }
        .gallery-footer {
            text-align: center;
            padding: 20px 0;
            color: #64748b;
            font-size: 11px;
            border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            z-index: 999; display: none; 
            justify-content: center; align-items: center;
        }
        .lightbox-overlay.active { display: flex; backdrop-filter: blur(10px);}
        .lightbox-image {
            max-width: 90%; max-height: 85%;
            border: 4px solid white;
        }
        .btn-close-lightbox {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
        }
        .btn-nav {
            position: fixed;
            top: 50%;
            color: white;
            font-size: 40px;
            background: rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
            padding: 20px;
            transform: translateY(-50%);
            z-index: 10000;
        }
        .prev { left: 0px; }
        .next { right: 0px; }
        .lightbox-content {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 95%;
        }
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; /* Luôn nằm dưới cùng */
            background-size: cover;
            background-position: center;
            transition: opacity 1.2s ease-in-out; /* Thời gian chuyển cảnh chậm, mượt */
        }
        
        /* Lớp phủ tối để làm nổi bật nội dung (đặc biệt quan trọng) */
        .bg-layer::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Độ tối tùy chỉnh */
        }
        
    </style>
</head>
<body>
    <div id="bg-layer-1" class="bg-layer" style="opacity: 1;"></div>
    <div id="bg-layer-2" class="bg-layer" style="opacity: 0;"></div>
    <button id="backToTop" style="position:fixed; bottom:20px; right:20px; display:none; padding:10px; border-radius:50%; border:none; background:#0284c7; color:white; cursor:pointer;">↑</button>
    <div id="effect-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></div>
    <header class="gallery-header">
        <div class="logo">MSweb</div>
        <nav class="nav-links">
            <a href="add.html">TRANG CHỦ</a> | <a href="#">VĂN BẢN</a> | <a href="#">PHIM</a> | <a href="#" class="active">ẢNH</a> | <a href="#">NHẠC</a>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <div class="section-title">Key gallery</div>
        <div class="category-bar">
            <span class="category-tab active" onclick="filterCategory('Clannad', this)">Clannad</span>
            <span class="category-tab" onclick="filterCategory('Anemoi', this)">Anemoi</span>
            <span class="category-tab" onclick="filterCategory('Summer Pockets', this)">Summer pockets</span>
            <span class="category-tab" onclick="filterCategory('Little Busters', this)">Little Busters</span>
            <span class="category-tab" onclick="filterCategory('Air', this)">Air</span>
            <span class="category-tab" onclick="filterCategory('Rewrite', this)">Rewrite</span>
            <span class="category-tab" onclick="filterCategory('Angel Beats', this)">Angel Beats</span>
            <span class="category-tab" onclick="filterCategory('Kanon', this)">Kanon</span>
            <span class="category-tab" onclick="filterCategory('Khác', this)">Khác</span>

        </div>
        <div class="search-upload-row">
            <div class="search-box-wrapper">
                <input type="text" class="search-input" id="search-input" placeholder="Tìm kiếm ảnh theo tên..." oninput="handleSearch()">
            </div>
            <div class="admin-buttons">

            </div>
        </div>

        </footer>
