<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anemoi Gallery - 4 Columns Edition</title>
    <script type="module">
        // Bên trong thẻ <script type="module">
        window.triggerUpload = triggerUpload;
        window.deleteItem = deleteItem;
        window.filterCategory = filterCategory;
        window.handleSearch = handleSearch;
        window.closeLightbox = closeLightbox;
        window.openLightbox = openLightbox;
        window.changeImage = changeImage;
        // Thêm vào trong thẻ <script type="module">
        window.galleryImages = [];
        window.currentCategory = 'Clannad';
        window.searchQuery = '';
        window.IMAGES_PER_PAGE = 32;
        window.currentPage = 1;
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDqjjFGMhVq8wF0_Tv3z7CCupB1Z2wKuPc",
            authDomain: "anemoi-4e558.firebaseapp.com",
            projectId: "anemoi-4e558",
            storageBucket: "anemoi-4e558.firebasestorage.app",
            messagingSenderId: "252203668975",
            appId: "1:252203668975:web:071bcf1b5a31fd229c121a",
            measurementId: "G-PPXQ3PHP4R"
        };

        // Khởi tạo
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
        window.doc = doc;

        // Thêm đoạn này ngay dưới các dòng khai báo biến window.galleryImages = ...
        const { galleryImages, currentCategory, searchQuery, IMAGES_PER_PAGE, currentPage } = window;

        onSnapshot(collection(window.db, "images"), (snapshot) => {
            galleryImages = [];
            snapshot.forEach((doc) => {
                // Lưu ID của tài liệu để sau này còn xóa ảnh
                galleryImages.push({ id: doc.id, ...doc.data() });
            });
            renderGallery();
        });
        const cloudName = "dhhzaymet"; 
        const uploadPreset = "jh3cmolr";
        function triggerUpload() {
            const myWidget = cloudinary.createUploadWidget({
                cloudName: "dhhzaymet",
                uploadPreset: "jh3cmolr",
                multiple: true,
                sources: ['local', 'url']
            }, async (error, result) => {
                if (!error && result && result.event === "success") {
                    const newItem = {
                        title: result.info.original_filename,
                        data: result.info.secure_url,
                        category: currentCategory
                    };
                    // Lưu vào Firebase Firestore
                    await addDoc(collection(window.db, "images"), newItem);
                    // Không cần renderGallery() ở đây vì onSnapshot sẽ tự động làm việc đó
                }
            });
            myWidget.open();
        }
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            currentPage = 1;
            renderGallery();
        }
        window.filterCategory(cat, el) {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentCategory = cat;
            currentPage = 1;

            if (backgroundUrls[cat]) {
                document.body.style.backgroundImage = `url("${backgroundUrls[cat]}")`;

            const body = document.body;

            const backgroundMap = {

                'Rewrite': 'url("CGKagari.png")',
                'Clannad': 'url("clannad-tomoya-okazaki-ushio-okazaki-okazaki-ushio-wallpaper-preview.jpg")',
                'Kanon': 'url("filters_quality(95)format(webp).webp")',
                'Air': 'url("8420bfad8ae2461f10decdc4d75ba993.jpg")',
                'Angel Beats': 'url("angel-beats-anime-girls-piano-angel-wallpaper-preview.jpg")',
                'Little Busters': 'url("488708789_1114601607348984_6705454001310567445_n.jpg")',
                'Summer Pockets': 'url("thumb-1920-778267.jpg")',
                'Anemoi': 'url("lFG6ACWFGOSsrwnQBThUpuTd8XXOwFSx6CQ2bRMZpe74vmGOwfbfH3CCArFmAfdV0N0uuOipKP-biKtABTAEl49mGjjmfIRHNn82DpoEq93q0tCzujAcpazDIz90HaHzEScUa_kw5aMx1FjYuP8xN3e2rHdb5afFLn7uMs6p10w.webp")',
            }
            body.style.backgroundImage = backgroundMap[cat] || 'url("hinh-nen-bau-troi-chill-10.jpg")'
            renderGallery();
        }
        // 1. Khai báo danh sách ảnh nền (chỉ cần làm 1 lần)
        const backgroundUrls = {
            'Clannad': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722041/clannad-tomoya-okazaki-ushio-okazaki-okazaki-ushio-wallpaper-preview_vdbosu.jpg',
            'Air': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722042/8420bfad8ae2461f10decdc4d75ba993_dioe8v.jpg',
            'Little Busters': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722042/488708789_1114601607348984_6705454001310567445_n_drbypw.jpg',
            'Rewrite': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722059/CGKagari_d447b3.png',
            'Kanon': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722041/filters_quality_95_format_webp_mrtbd1.webp',
            'Angel Beats': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722041/angel-beats-anime-girls-piano-angel-wallpaper-preview_dcc0wp.jpg',
            'Anemoi': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722041/lFG6ACWFGOSsrwnQBThUpuTd8XXOwFSx6CQ2bRMZpe74vmGOwfbfH3CCArFmAfdV0N0uuOipKP-biKtABTAEl49mGjjmfIRHNn82DpoEq93q0tCzujAcpazDIz90HaHzEScUa_kw5aMx1FjYuP8xN3e2rHdb5afFLn7uMs6p10w_hakyr5.webp',
            'Summer Pockets': 'https://res.cloudinary.com/dhhzaymet/image/upload/v1782722073/thumb-1920-778267_ht3lo1.jpg',
            // ... thêm các mục khác
        };
        
        // 2. Hàm preload ảnh (chạy ngay khi load trang)
        function preloadBackgrounds() {
            Object.values(backgroundUrls).forEach(url => {
                const img = new Image();
                img.src = url;
            });
        }
        preloadBackgrounds();
        
        // 3. Sửa hàm filterCategory để đổi nền mượt mà
        
        
        // 4. Sửa hàm onload để F5 không bị đen
        window.onload = () => {
            // Set nền mặc định là Clannad ngay lập tức
            document.body.style.backgroundImage = `url("${backgroundUrls['Clannad']}")`;
            renderGallery();
        };
        window.renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const pagination = document.getElementById('pagination');
            grid.innerHTML = ''; pagination.innerHTML = '';
            let filtered = galleryImages; // Bước 1: Mặc định lấy tất cả ảnh

            if (currentCategory !== 'All') { // Bước 2: Chỉ lọc nếu category khác 'All'
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }
            if (searchQuery) filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            if (!filtered.length) {
                grid.innerHTML = `<div class="no-results">Thư mục [${currentCategory}] trống.</div>`;
                return;
            }
            const totalPages = Math.ceil(filtered.length / IMAGES_PER_PAGE);
            const pageImages = filtered.slice((currentPage - 1) * IMAGES_PER_PAGE, currentPage * IMAGES_PER_PAGE);
            pageImages.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <button class="btn-delete-item" onclick="deleteItem(event, '${item.id}')">✕</button>
                    <div class="item-title">[ ${item.title} ]</div>
                    <div class="image-box" onclick="openLightbox('${item.data}')">
                        <img src="${item.data}">
                    </div>
                    <button class="btn-action" onclick="openLightbox('${item.data}')">拡大表示</button>
                `;
                grid.appendChild(div);
            });
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('span');
                    btn.className = `page-link ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => { currentPage = i; renderGallery(); };
                    pagination.appendChild(btn);
                }
            }
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        async function deleteItem(e, id) {
            e.stopPropagation();
            // Thay 'db' bằng 'window.db'
            await deleteDoc(doc(window.db, "images", id)); 
            
    
            
        }
        window.openLightbox(src) {
            // 1. Tạo lại mảng filtered giống hệt logic trong renderGallery/changeImage
            let filtered = galleryImages;
            if (currentCategory !== 'All') {
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }
            if (searchQuery) {
                filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            }

            // 2. Tìm index của ảnh trong mảng ĐÃ LỌC
            currentIndex = filtered.findIndex(img => img.data === src);
    
            // 3. Hiển thị
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        // Dùng đoạn code này thay thế cho hàm changeImage hiện tại của bạn
        window.changeImage(step) {
            // BƯỚC 1: LẤY DANH SÁCH ẢNH ĐANG ĐƯỢC LỌC (GIỐNG HỆT TRONG RENDERGALLERY)
            let filtered = galleryImages; // Bắt đầu với tất cả ảnh

            // a. Áp dụng bộ lọc danh mục
            if (currentCategory !== 'All') {
                filtered = galleryImages.filter(img => img.category === currentCategory);
            }

            // b. Áp dụng bộ lọc tìm kiếm
            if (searchQuery) {
                filtered = filtered.filter(img => img.title.toLowerCase().includes(searchQuery));
            }

            // Nếu không có ảnh nào, thoát luôn
            if (filtered.length === 0) return;

            // BƯỚC 2: TÍNH TOÁN INDEX MỚI DỰA TRÊN DANH SÁCH ĐÃ LỌC
            // (Dùng phép toán chia lấy dư % để đảm bảo nó quay vòng)
            currentIndex = (currentIndex + step + filtered.length) % filtered.length;

            // BƯỚC 3: CẬP NHẬT ẢNH TRÊN LIGHTBOX
            document.getElementById('lightbox-img').src = filtered[currentIndex].data;
    
            // Tùy chọn: Cập nhật thêm tiêu đề nếu muốn
            // document.getElementById('lightbox-title').innerText = filtered[currentIndex].title;
        }
        let currentIndex = 0; // Biến lưu chỉ số ảnh đang xem
        document.addEventListener('keydown', function(e) {
            // Chỉ chạy nếu Lightbox đang mở
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    changeImage(-1); // Lùi ảnh
                } else if (e.key === 'ArrowRight') {
                    changeImage(1);  // Tới ảnh
                } else if (e.key === 'Escape') {
                    closeLightbox(); // Nhấn Esc để thoát
                }
            }
        });
        
        </script>

        <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        /* --- 1. THIẾT LẬP CƠ BẢN & NỀN TRỜI --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-image: url('hinh-nen-bau-troi-chill-10.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            transition: background-image 0.8s ease-in-out;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Lớp phủ đen 40% */
            z-index: -1; /* Luôn nằm dưới ảnh gallery */
        }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px; /* Mở rộng chiều rộng tổng thể */
            padding: 25px 50px 10px 50px; 
            margin: 0 auto;
        }
        .logo {
            font-weight: bold;
            font-size: 22px;
            color: #0284c7;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .nav-links a {
            text-decoration: none;
            color: #0284c7;
            padding: 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .nav-links a.active, .nav-links a:hover {
            font-weight: bold;
            text-decoration: underline;
        }
        .dashboard-wrapper {
            width: 90%;
            max-width: 1200px; /* Cùng chiều rộng với khung ảnh */
            padding: 10px 0px 20px 0px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-title {
            font-size: 32px;
            font-weight: bold;
            color: #0284c7;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
            font-family: 'Georgia', serif;
        }
        .category-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 6px 16px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid #cbd5e1;
            color: #475569;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .category-tab.active {
            background-color: #0284c7;
            color: white;
            border-color: #0284c7;
        }
        .search-upload-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .search-box-wrapper {
            flex: 1;
            max-width: 600px; /* Tăng độ dài thanh tìm kiếm cho cân xứng */
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .btn-upload {
            padding: 10px 24px;
            border: 1px solid #0284c7;
            background-color: rgba(255, 255, 255, 0.8); 
            color: #0284c7;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-upload:hover {
            background-color: #0284c7;
            color: white;
        }
        #file-input {
            display: none;
        }
        .gallery-container {
            background-color: rgba(255, 255, 255, 0.85); 
            width: 90%;
            max-width: 1200px; 
            min-height: 580px; 
            padding: 0 40px; /* Giảm nhẹ padding bên trong để ảnh to hơn */
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.15); 
            margin: 0 auto;
        }
        /* Thiết lập cho màn hình nhỏ (Điện thoại) */
        @media (max-width: 600px) {
            #gallery-grid {
                /* Chuyển từ 4 cột sang 1 cột duy nhất trên điện thoại */
                grid-template-columns: 1fr !important; 
            }
            .gallery-item {
                /* Đảm bảo mỗi mục chiếm hết chiều ngang */
                width: 100%;
            }
        }

        /* Thiết lập cho màn hình máy tính bảng */
        @media (min-width: 601px) and (max-width: 1024px) {
            #gallery-grid {
                /* Chia thành 2 cột cho máy tính bảng */
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }
        .gallery-grid {
            display: grid;
            gap: 30px 15px; /* Giảm gap để vừa vặn 4 cột */
            padding: 40px 0 20px 0;
            width: 100%;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            transition: all 0.3s ease;
            
            
        }
        .gallery-item {
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .gallery-item img {
            width: 100%;
            height: 250px; /* Chiều cao cố định, bạn có thể chỉnh theo ý muốn */
            object-fit: cover; /* Cắt ảnh lấp đầy khung mà không làm biến dạng tỷ lệ */
            border-radius: 8px; /* Bo góc ảnh cho đẹp */
            transition: transform 0.3s ease; /* Hiệu ứng nhẹ khi di chuột vào */
        }
        
        .gallery-item img:hover {
            transform: scale(1.02); /* Phóng nhẹ khi di chuột vào ảnh */
        }
        .btn-delete-item {
            position: absolute;
            top: 30px; 
            right: 5px;
            width: 24px;
            height: 24px;
            background-color: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            opacity: 0; 
            transition: all 0.2s;
        }
        .gallery-item:hover .btn-delete-item {
            opacity: 1;
        }
        .item-title {
            color: #0284c7;
            font-size: 13px; /* Thu nhỏ chữ tiêu đề một chút */
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-box {
            width: 100%;
            height: 270px; /* GIẢM ĐỘ CAO: Từ 400px xuống 320px để cân đối 4 cột */
            border: 1px solid #cbd5e1;
            padding: 4px; 
            background-color: #f8fafc; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: zoom-in; 
        }
        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover; 
            transition: transform 0.3s;
            border-radius: 8px
        }
        .image-box:hover img {
            transform: scale(1.05);
        }
        .btn-action {
            margin-top: 12px;
            width: 100%;
            padding: 6px 0;
            border: 1px solid #334155;
            background-color: white;
            border-radius: 20px; 
            font-size: 12px;
            cursor: pointer;
        }
        .no-results {
            grid-column: span 4; /* SPAN 4: Để tin nhắn báo trống nằm giữa 4 cột */
            text-align: center;
            padding: 60px 0;
            color: #64748b;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            gap: 8px;
        }
        .page-link {
            padding: 5px 10px;
            border: 1px solid #cbd5e1;
            background-color: white;
            color: #0284c7;
            border-radius: 4px;
            cursor: pointer;
        }
        .page-link.active {
            background-color: #0284c7;
            color: white;
        }
        .gallery-footer {
            text-align: center;
            padding: 20px 0;
            color: #64748b;
            font-size: 11px;
            border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            z-index: 999; display: none; 
            justify-content: center; align-items: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-image {
            max-width: 90%; max-height: 85%;
            border: 4px solid white;
        }
        .btn-close-lightbox {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
        }
        .btn-nav {
            position: fixed;
            top: 50%;
            color: white;
            font-size: 40px;
            background: rgba(0,0,0,0.3);
            border: none;
            cursor: pointer;
            padding: 20px;
            transform: translateY(-50%);
            z-index: 10000;
        }
        .prev { left: 0px; }
        .next { right: 0px; }
        .lightbox-content {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 95%;
        }
    </style>
</head>
